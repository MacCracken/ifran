[workspace]
resolver = "2"
members = [
    "crates/synapse-types",
    "crates/synapse-core",
    "crates/synapse-backends",
    "crates/synapse-train",
    "crates/synapse-api",
    "crates/synapse-bridge",
    "crates/synapse-cli",
    # "crates/synapse-desktop/src-tauri",
]

[workspace.package]
version = "2026.3.18-2"
edition = "2024"
license = "MIT"
repository = "https://github.com/MacCracken/synapse"

[workspace.lints.clippy]
collapsible_if = "allow"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
tokio-util = { version = "0.7", features = ["io"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Error handling
thiserror = "2"
anyhow = "1"

# Logging / tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# OpenTelemetry
opentelemetry = "0.27"
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.27", features = ["tonic"] }
tracing-opentelemetry = "0.28"

# HTTP / API
axum = { version = "0.8", features = ["ws"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "limit"] }
governor = "0.8"

# gRPC
tonic = "0.12"
tonic-build = "0.12"
prost = "0.13"

# Database
rusqlite = { version = "0.32", features = ["bundled"] }

# CLI
clap = { version = "4", features = ["derive"] }

# Async utilities
async-trait = "0.1"
futures = "0.3"
dashmap = "6"

# Crypto / hashing
sha2 = "0.10"
blake3 = "1"

# UUID
uuid = { version = "1", features = ["v4", "serde"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Indicatif for progress bars
indicatif = "0.17"

# Property-based testing
proptest = "1"

# Hardware acceleration detection
ai-hwaccel = { path = "../ai-hwaccel" }

[profile.release]
opt-level = 3
lto = "thin"
strip = true

[profile.dev]
opt-level = 0
