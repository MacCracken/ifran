syntax = "proto3";
package ifran;

service IfranService {
  rpc PullModel(PullModelRequest) returns (stream PullProgress);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc LoadModel(LoadModelRequest) returns (LoadModelResponse);
  rpc UnloadModel(UnloadModelRequest) returns (UnloadModelResponse);
  rpc Infer(InferenceRequest) returns (InferenceResponse);
  rpc InferStream(InferenceRequest) returns (stream StreamChunk);
  rpc GetStatus(StatusRequest) returns (StatusResponse);
}

message PullModelRequest {
  string model_name = 1;
  string quant = 2;
  string source = 3;
}

message PullProgress {
  uint64 downloaded_bytes = 1;
  uint64 total_bytes = 2;
  string state = 3;
}

message ListModelsRequest {}
message ListModelsResponse {
  repeated ModelInfo models = 1;
}

message ModelInfo {
  string id = 1;
  string name = 2;
  string format = 3;
  string quant = 4;
  uint64 size_bytes = 5;
  string local_path = 6;
}

message LoadModelRequest {
  string model_id = 1;
  string backend = 2;
}
message LoadModelResponse {
  string handle = 1;
}

message UnloadModelRequest {
  string handle = 1;
}
message UnloadModelResponse {}

message InferenceRequest {
  string handle = 1;
  string prompt = 2;
  uint32 max_tokens = 3;
  float temperature = 4;
}
message InferenceResponse {
  string text = 1;
  uint32 prompt_tokens = 2;
  uint32 completion_tokens = 3;
}

message StreamChunk {
  string text = 1;
  bool done = 2;
}

message StatusRequest {}
message StatusResponse {
  repeated string loaded_models = 1;
  repeated GpuInfo gpus = 2;
}

message GpuInfo {
  uint32 id = 1;
  string name = 2;
  uint64 memory_total_mb = 3;
  uint64 memory_used_mb = 4;
}
