# Drop-in override for inference-only mode.
# Install to: /etc/systemd/system/synapse.service.d/inference.conf
#
# Tighter security: no write access beyond logs, no network bind for training.

[Service]
# Override ReadWritePaths — inference doesn't need checkpoint writes
ReadWritePaths=/var/lib/synapse/models /var/lib/synapse/cache
# Restrict system calls to networking + GPU only (no fork for training subprocesses)
SystemCallFilter=@system-service @network-io @io-event
# No subprocess spawning (training uses docker/subprocess executors)
Environment=SYNAPSE_TRAINING_DISABLED=1
