# Drop-in override for training mode.
# Install to: /etc/systemd/system/synapse.service.d/training.conf
#
# Relaxed security: needs checkpoint writes, subprocess spawning, Docker access.

[Service]
# Training needs broader write access for checkpoints and datasets
ReadWritePaths=/var/lib/synapse
# Allow subprocess spawning for training executors
SystemCallFilter=@system-service @network-io @io-event @process
# Docker socket access for container-based training
SupplementaryGroups=docker
