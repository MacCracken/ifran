[package]
name = "synapse"
description = "LLM controller for pulling, managing, and training language models"
license = "MIT"
version_file = "VERSION"
homepage = "https://github.com/MacCracken/synapse"

[build]
type = "cargo"
workspace_members = ["synapse-cli", "synapse-api"]
release = true

[install]
bin = [
    { src = "synapse", dst = "/usr/local/bin/synapse" },
    { src = "synapse-api", dst = "/usr/local/bin/synapse-server" },
]
config = [
    { src = "deploy/synapse.toml.example", dst = "/etc/synapse/synapse.toml", mode = "0644" },
]
service = [
    { src = "deploy/synapse.service", dst = "/etc/systemd/system/synapse.service" },
]
dirs = [
    { path = "/var/lib/synapse", owner = "synapse", group = "synapse", mode = "0750" },
    { path = "/var/lib/synapse/models", owner = "synapse", group = "synapse", mode = "0750" },
    { path = "/var/lib/synapse/checkpoints", owner = "synapse", group = "synapse", mode = "0750" },
    { path = "/var/lib/synapse/cache", owner = "synapse", group = "synapse", mode = "0750" },
    { path = "/etc/synapse", owner = "root", group = "synapse", mode = "0750" },
]

[user]
name = "synapse"
group = "synapse"
system = true
home = "/var/lib/synapse"
shell = "/usr/sbin/nologin"
description = "Synapse LLM Controller"

[hooks]
pre_install = """
# Create synapse system user if it doesn't exist
if ! getent passwd synapse >/dev/null 2>&1; then
    useradd --system --user-group --home-dir /var/lib/synapse \
            --shell /usr/sbin/nologin --comment "Synapse LLM Controller" synapse
fi
"""

post_install = """
# Ensure ownership
chown -R synapse:synapse /var/lib/synapse
chmod 0750 /var/lib/synapse

# Reload systemd and enable service
systemctl daemon-reload
systemctl enable synapse.service

# Register as Agnosticos capability provider
if command -v agnosticos >/dev/null 2>&1; then
    agnosticos capability register synapse \
        --type llm-inference \
        --endpoint http://127.0.0.1:8420 \
        --grpc-endpoint http://127.0.0.1:8421 \
        --capabilities 'model-pull,inference,training,openai-compat' \
        --health-check http://127.0.0.1:8420/health \
        2>/dev/null || true
fi

echo "Synapse installed. Start with: systemctl start synapse"
"""

post_remove = """
# Deregister from Agnosticos
if command -v agnosticos >/dev/null 2>&1; then
    agnosticos capability deregister synapse 2>/dev/null || true
fi

systemctl stop synapse.service 2>/dev/null || true
systemctl disable synapse.service 2>/dev/null || true
systemctl daemon-reload
"""

[capabilities]
# Agnosticos agent-runtime capability provider registration
type = "llm-inference"
name = "synapse"
version_source = "VERSION"
endpoints = [
    { protocol = "http", port = 8420, path = "/health", role = "rest-api" },
    { protocol = "grpc", port = 8421, role = "bridge" },
]
provides = [
    "model-pull",
    "model-management",
    "inference",
    "inference-streaming",
    "openai-compatible-api",
    "training",
    "hardware-detection",
]
