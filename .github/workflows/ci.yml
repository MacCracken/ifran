name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

permissions:
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust environment
        id: setup
        uses: ./.github/actions/setup-rust-env
        with:
          targets: ${{ matrix.target }}
          cache-prefix: build-${{ matrix.target }}
          install-cross: ${{ matrix.use-cross }}

      - name: Build workspace (native)
        if: matrix.use-cross == false
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Build workspace (cross)
        if: matrix.use-cross == true
        run: cross build --workspace --release --target ${{ matrix.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/synapse
            target/${{ matrix.target }}/release/synapse-api
          retention-days: 7

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust environment
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: quality

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace -- -D warnings

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust environment
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: security

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny
        run: cargo deny check

      - name: Install cargo-outdated
        run: cargo install cargo-outdated --locked

      - name: Run cargo outdated
        run: cargo outdated --root-deps-only --exit-code 1
        continue-on-error: true

  test:
    name: Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package:
          - synapse-types
          - synapse-core
          - synapse-backends
          - synapse-train
          - synapse-api
          - synapse-bridge
          - synapse-cli
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust environment
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: test-${{ matrix.package }}

      - name: Run tests
        run: cargo test -p ${{ matrix.package }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust environment
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: coverage

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run coverage
        run: |
          cargo tarpaulin --workspace \
            --out xml \
            --output-dir coverage \
            --fail-under 80 \
            --timeout 300

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust environment
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: bench

      - name: Run benchmarks
        run: cargo test --workspace --release -- --ignored 2>/dev/null || echo "No benchmarks defined yet"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required documentation files exist
        run: |
          missing=0
          for file in README.md docs/development/roadmap.md CONTRIBUTING.md SECURITY.md LICENSE; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing required documentation file: $file"
              missing=1
            else
              echo "Found: $file"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Setup Rust environment
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: docs

      - name: Build documentation
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  container:
    name: Container Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: synapse:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container startup
        run: |
          docker run --rm -d --name synapse-test synapse:ci-test
          sleep 5
          docker logs synapse-test
          docker stop synapse-test

  license:
    name: License Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check LICENSE contains MIT License
        run: |
          if grep -q "MIT License" LICENSE; then
            echo "LICENSE file contains MIT License"
          else
            echo "::error::LICENSE file does not contain 'MIT License'"
            exit 1
          fi
