services:
  ifran-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8420:8420"
      - "8421:8421"
    volumes:
      - ifran-models:/var/lib/ifran/models
      - ifran-data:/var/lib/ifran/data
    environment:
      - IFRAN_STORAGE__MODELS_DIR=/var/lib/ifran/models
      - IFRAN_STORAGE__DATABASE=/var/lib/ifran/data/ifran.db
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ifran-models:
  ifran-data:
